<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Luggage Storage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>

    <!-- Your Firebase config and auth helpers -->
    <script src="/LuggageStorage/js/firebase-config.js"></script>
    <script src="/LuggageStorage/js/auth.js"></script>
    
    <style>
        .dashboard {
            padding: 100px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .welcome-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .welcome-card h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.2);
        }
        
        .stat-icon {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
        
        .booking-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }
        
        .booking-card:hover {
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .booking-id {
            font-weight: 700;
            color: #667eea;
        }
        
        .booking-status {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-active {
            background: #10b981;
            color: white;
        }
        
        .status-completed {
            background: #94a3b8;
            color: white;
        }
        
        .booking-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        
        .detail-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-weight: 600;
        }
        
        .qr-code-small {
            width: 50px;
            height: 50px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .booking-details {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/LuggageStorage/" class="logo">
                <i class="fas fa-suitcase"></i>
                <span>Luggage Storage</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/LuggageStorage/#how-it-works">How it works</a></li>
                <li><a href="/LuggageStorage/locations">Locations</a></li>
                <li><a href="/LuggageStorage/#reviews">Reviews</a></li>
                <li><a href="/LuggageStorage/faq">FAQ</a></li>
                <li><a href="/LuggageStorage/partner" class="btn-outline">Become a partner</a></li>
                <li><a href="/LuggageStorage/booking" class="btn-primary">Book now</a></li>
                <!-- Auth Links -->
                <li class="auth-hidden" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
                <li class="auth-required"><a href="/LuggageStorage/login.html" class="btn-outline">Login</a></li>
                <li class="auth-required"><a href="/LuggageStorage/signup.html" class="btn-primary">Sign Up</a></li>
                <li><span id="userEmail" style="color: #667eea; font-weight: 500;"></span></li>
            </ul>
        </div>
    </nav>
    
    <div class="dashboard">
        <div class="welcome-card">
            <h1>Welcome back, <span id="userName">Customer</span>!</h1>
            <p>Manage your bookings and storage history</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-suitcase"></i></div>
                <div class="stat-number" id="activeBookings">0</div>
                <div class="stat-label">Active Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-number" id="totalDays">0</div>
                <div class="stat-label">Storage Days</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-number" id="totalSpent">$0</div>
                <div class="stat-label">Total Spent</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-number" id="pastBookings">0</div>
                <div class="stat-label">Past Bookings</div>
            </div>
        </div>
        
        <h2 style="margin-bottom: 20px;">Your Bookings</h2>
        <div id="bookingsList"></div>
    </div>
    
    <!-- Firebase config & auth are loaded in the head -->
    
    <script>
        let currentUser = null;
        
        // Load user's bookings
        function loadUserBookings(userId) {
            db.collection('bookings')
                .where('userId', '==', userId)
                .orderBy('createdAt', 'desc')
                .get()
                .then((querySnapshot) => {
                    let activeCount = 0;
                    let pastCount = 0;
                    let totalDays = 0;
                    let totalSpent = 0;
                    let bookingsHtml = '';
                    
                    querySnapshot.forEach((doc) => {
                        const booking = doc.data();
                        
                        // Calculate stats
                        if (booking.status === 'active') activeCount++;
                        else pastCount++;
                        
                        totalSpent += parseFloat(booking.total.replace('$', ''));
                        
                        // Calculate days
                        const dropoff = new Date(booking.dropoff);
                        const pickup = new Date(booking.pickup);
                        const days = Math.ceil((pickup - dropoff) / (1000 * 60 * 60 * 24));
                        totalDays += days;
                        
                        // Create booking card
                        bookingsHtml += `
                            <div class="booking-card">
                                <div class="booking-header">
                                    <span class="booking-id">${booking.bookingId}</span>
                                    <span class="booking-status status-${booking.status}">${booking.status}</span>
                                </div>
                                <div class="booking-details">
                                    <div class="detail-item">
                                        <span class="detail-label">Drop-off</span>
                                        <span class="detail-value">${booking.dropoff}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Pick-up</span>
                                        <span class="detail-value">${booking.pickup}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Bags</span>
                                        <span class="detail-value">${booking.bags}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Total</span>
                                        <span class="detail-value">${booking.total}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    // Update stats
                    document.getElementById('activeBookings').textContent = activeCount;
                    document.getElementById('pastBookings').textContent = pastCount;
                    document.getElementById('totalDays').textContent = totalDays;
                    document.getElementById('totalSpent').textContent = '$' + totalSpent;
                    
                    if (bookingsHtml) {
                        document.getElementById('bookingsList').innerHTML = bookingsHtml;
                    } else {
                        document.getElementById('bookingsList').innerHTML = `
                            <div style="text-align: center; padding: 60px 20px;">
                                <i class="fas fa-suitcase" style="font-size: 60px; color: #cbd5e0; margin-bottom: 20px;"></i>
                                <h3>No bookings yet</h3>
                                <p style="color: #64748b; margin-bottom: 20px;">Ready to explore Sydney hands-free?</p>
                                <a href="/LuggageStorage/booking.html" class="btn-primary">Make a Booking</a>
                            </div>
                        `;
                    }
                });
        }
        
        // Check authentication
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                
                // Get user name from Firestore
                db.collection('users').doc(user.uid).get()
                    .then(doc => {
                        if (doc.exists) {
                            const name = doc.data().name;
                            document.getElementById('userName').textContent = name.split(' ')[0];
                            
                            // Verify role
                            if (doc.data().role !== 'customer') {
                                window.location.href = `/${doc.data().role}.html`;
                            }
                        }
                    });
                
                loadUserBookings(user.uid);
            } else {
                window.location.href = '/LuggageStorage/login.html';
            }
        });
    </script>
</body>
</html>
