        <div class="stat-icon"><i class="fas fa-suitcase"></i></div>
        <div class="stat-number" id="todayBookings">0</div>
        <div class="stat-label">Today's Bookings</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-number" id="todayEarnings">$0</div>
        <div class="stat-label">Today's Earnings</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-calendar"></i></div>
        <div class="stat-number" id="upcomingBookings">0</div>
        <div class="stat-label">Upcoming</div>

    <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
        <div class="stat-number" id="monthlyEarnings">$0</div>
        <div class="stat-label">This Month</div>
