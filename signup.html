<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Luggage Storage Sydney</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: gradientBG 15s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease;
            transform-origin: center;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            animation: shimmer 6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(45deg) translateY(0); }
            100% { transform: rotate(45deg) translateY(100%); }
        }

        .auth-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 800;
            position: relative;
        }

        .auth-header p {
            font-size: 16px;
            opacity: 0.9;
            position: relative;
        }

        .auth-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            animation: fadeIn 0.6s ease;
        }

        .role-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .role-option:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
        }

        .role-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f9ff, #e6f0ff);
        }

        .role-option i {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .role-option div {
            font-weight: 600;
            color: #1e293b;
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-auth:active {
            transform: translateY(-1px);
        }

        .btn-auth::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .btn-auth:hover::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        .btn-google {
            width: 100%;
            padding: 16px;
            background: white;
            color: #1e293b;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
            font-weight: 500;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            animation: fadeIn 0.8s ease;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auth-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .partner-fields {
            display: none;
            animation: slideDown 0.5s ease;
            padding: 20px;
            background: #f8fafc;
            border-radius: 15px;
            margin-top: 10px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .partner-fields.show {
            display: block;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .name-row {
                grid-template-columns: 1fr;
            }
            
            .auth-body {
                padding: 30px 20px;
            }
            
            .auth-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join Luggage Storage Sydney</p>
        </div>
        
        <div class="auth-body">
            <!-- Role Selection -->
            <div class="role-selector">
                <div class="role-option selected" onclick="selectRole('customer')" id="roleCustomer">
                    <i class="fas fa-user"></i>
                    <div>Customer</div>
                </div>
                <div class="role-option" onclick="selectRole('partner')" id="rolePartner">
                    <i class="fas fa-store"></i>
                    <div>Partner</div>
                </div>
            </div>
            
            <!-- Signup Form -->
            <form id="signupForm" onsubmit="event.preventDefault(); handleSignup()">
                <div class="name-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+61 4xx xxx xxx" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <!-- Partner fields (hidden by default) -->
                <div id="partnerFields" class="partner-fields">
                    <div class="form-group">
                        <label>Store Name</label>
                        <input type="text" id="storeName" class="form-control" placeholder="TSG City Centre">
                    </div>
                    <div class="form-group">
                        <label>Store Address</label>
                        <input type="text" id="storeAddress" class="form-control" placeholder="69-75 King St, Sydney">
                    </div>
                    <div class="form-group">
                        <label>ABN (Optional)</label>
                        <input type="text" id="abn" class="form-control" placeholder="12 345 678 901">
                    </div>
                </div>
                
                <button type="submit" class="btn-auth" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner" style="display: none;"></span>
                </button>
            </form>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <button onclick="googleSignIn()" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <script>
        let selectedRole = 'customer';
        
        function selectRole(role) {
            selectedRole = role;
            
            // Update UI
            document.getElementById('roleCustomer').classList.toggle('selected', role === 'customer');
            document.getElementById('rolePartner').classList.toggle('selected', role === 'partner');
            
            const partnerFields = document.getElementById('partnerFields');
            if (role === 'partner') {
                partnerFields.classList.add('show');
            } else {
                partnerFields.classList.remove('show');
            }
        }
        
        async function handleSignup() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (!firstName || !lastName || !email || !phone || !password) {
                showNotification('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Show loading state
            const btn = document.getElementById('signupBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            btn.disabled = true;
            
            const fullName = firstName + ' ' + lastName;
            
            try {
                // Create user in Firebase Auth
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Prepare user data
                const userData = {
                    name: fullName,
                    email: email,
                    phone: phone,
                    role: selectedRole,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    uid: user.uid
                };
                
                // Add partner data if applicable
                if (selectedRole === 'partner') {
                    userData.storeName = document.getElementById('storeName').value.trim() || 'Pending';
                    userData.storeAddress = document.getElementById('storeAddress').value.trim() || '69-75 King St, Sydney';
                    userData.abn = document.getElementById('abn').value.trim() || 'Pending';
                }
                
                // Save to Firestore
                await db.collection('users').doc(user.uid).set(userData);
                
                showNotification('Account created successfully!', 'success');
                
                // Redirect based on role
                setTimeout(() => {
                    if (selectedRole === 'customer') {
                        window.location.href = '/LuggageStorage/dashboard/customer.html';
                    } else if (selectedRole === 'partner') {
                        window.location.href = '/LuggageStorage/dashboard/partner.html';
                    } else {
                        window.location.href = '/LuggageStorage/';
                    }
                }, 1500);
                
            } catch (error) {
                console.error('Signup error:', error);
                showNotification(error.message, 'error');
                
                // Reset button
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }
        
        function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            firebase.auth().signInWithPopup(provider)
                .then(async (result) => {
                    const user = result.user;
                    
                    // Check if user exists in Firestore
                    const doc = await db.collection('users').doc(user.uid).get();
                    
                    if (!doc.exists) {
                        // New user - create profile
                        await db.collection('users').doc(user.uid).set({
                            name: user.displayName || 'Google User',
                            email: user.email,
                            phone: '',
                            role: 'customer',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            uid: user.uid
                        });
                    }
                    
                    showNotification('Logged in with Google!', 'success');
                    
                    // Get role and redirect
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const role = userDoc.exists ? userDoc.data().role : 'customer';
                    
                    setTimeout(() => {
                        window.location.href = `/LuggageStorage/dashboard/${role}.html`;
                    }, 1500);
                })
                .catch((error) => {
                    console.error('Google sign-in error:', error);
                    showNotification(error.message, 'error');
                });
        }
        
        function showNotification(message, type) {
            // Remove any existing notification
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                padding: 15px 25px;
                border-radius: 50px;
                z-index: 9999;
                animation: slideIn 0.3s;
                font-family: 'Inter', sans-serif;
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
                max-width: 350px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.3s';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Add animation styles if not present
        if (!document.getElementById('authStyles')) {
            const style = document.createElement('style');
            style.id = 'authStyles';
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                @keyframes fadeOut {
                    from { opacity: 1; }
                    to { opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
